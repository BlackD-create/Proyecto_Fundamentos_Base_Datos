{% extends 'base.html' %}

{% block titulo %}
Nuevo Departamento
{% endblock %}

{% block contenido %}
<div class="main-content">
<h2>Nuevo Departamento</h2>

<form method="POST">

<div class="mb-3">

<label>

Código

</label>

<input
type="number"
name="codigo"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Nombre

</label>

<input
type="text"
name="nombre"
class="form-control"
required>

</div>

<button class="btn btn-success">

Guardar

</button>

<a href="/departamentos"
class="btn btn-secondary">

Cancelar

</a>

</form>
</div>
{% endblock %}
