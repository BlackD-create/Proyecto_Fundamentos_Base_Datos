{% extends 'base.html' %}

{% block titulo %}
Departamentos
{% endblock %}

{% block contenido %}
<div class="main-content">
<h2 class="mb-4">Lista de Departamentos</h2>

<a href="/departamentos/nuevo"
class="btn btn-success mb-3">

<i class="bi bi-plus-circle"></i>

Nuevo Departamento

</a>

<table class="table table-bordered table-hover shadow">

    <thead class="table-dark">

        <tr>

            <th>Código</th>

            <th>Nombre</th>

            <th width="180">

                Acciones

            </th>

        </tr>

    </thead>

    <tbody>

    {% for departamento in departamentos %}

        <tr>

            <td>{{ departamento.codigo }}</td>

            <td>{{ departamento.nombre }}</td>

            <td>

                <a href="/departamentos/editar/{{ departamento.codigo }}"
                class="btn btn-warning btn-sm">

                    Editar

                <a href="#"
                   class="btn btn-danger btn-sm"
                   onclick="confirmarEliminar(
                        '/departamentos/eliminar/{{ departamento.codigo }}',
                        '¿Está seguro de eliminar este departamento?'
                   )">

                    Eliminar

                </a>
            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>
</div>
{% endblock %}
