{% extends 'base.html' %}

{% block titulo %}
Nuevo Docente
{% endblock %}

{% block contenido %}
<div class="main-content">
<h2 class="mb-4">Nuevo Docente</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">

            Cédula

        </label>

        <input
            type="text"
            name="cedula"
            class="form-control"
            maxlength="10"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Nombre

        </label>

        <input
            type="text"
            name="nombre"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Especialidad

        </label>

        <input
            type="text"
            name="especialidad"
            class="form-control"
            required>

    </div>

    <div class="mb-4">

        <label class="form-label">

            Departamento

        </label>

        <select
            name="codigo_dep"
            class="form-select"
            required>

            <option value="" selected disabled>

                Seleccione un departamento

            </option>

            {% for departamento in departamentos %}

                <option value="{{ departamento.codigo }}">

                    {{ departamento.nombre }}

                </option>

            {% endfor %}

        </select>

    </div>

    <button class="btn btn-success">

        Guardar

    </button>

    <a href="/docentes"
       class="btn btn-secondary">

        Cancelar

    </a>

</form>
</div>
{% endblock %}
